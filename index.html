<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyApvPiO5tZbYHhVmjUVrytFJ846N3SfDrE",
  authDomain: "tour-cartagena.firebaseapp.com",
  projectId: "tour-cartagena",
  storageBucket: "tour-cartagena.firebasestorage.app",
  messagingSenderId: "251056102465",
  appId: "1:251056102465:web:610c910c412d6f2064bac0"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


let rating = 0;

function setRating(value) {
    rating = value;
    const stars = document.querySelectorAll("#star-rating span");

    stars.forEach((star, index) => {
        star.classList.toggle("active", index < value);
    });
}

window.setRating = setRating;

async function addReview() {
    const name = document.getElementById("review-name").value;
    const text = document.getElementById("review-text").value;
    const photoInput = document.getElementById("review-photo");

    if (!name || !text || rating === 0) {
        alert("Completa todos los campos");
        return;
    }

    let photoBase64 = null;

    if (photoInput.files[0]) {
        const reader = new FileReader();

        reader.onload = async function(e) {
            photoBase64 = e.target.result;

            await addDoc(collection(db, "reviews"), {
                name,
                text,
                rating,
                photo: photoBase64,
                fecha: new Date()
            });

            mostrarReseñas();
        };

        reader.readAsDataURL(photoInput.files[0]);
    } else {
        await addDoc(collection(db, "reviews"), {
            name,
            text,
            rating,
            photo: null,
            fecha: new Date()
        });

        mostrarReseñas();
    }

    document.getElementById("review-name").value = "";
    document.getElementById("review-text").value = "";
    document.getElementById("review-photo").value = "";
    setRating(0);
}

window.addReview = addReview;

async function mostrarReseñas() {
    const container = document.getElementById("reviews-container");
    container.innerHTML = "";

    const q = query(collection(db, "reviews"), orderBy("fecha", "desc"));
    const snapshot = await getDocs(q);

    snapshot.forEach(doc => {
        const r = doc.data();

        const div = document.createElement("div");
        div.className = "review";

        const stars = "⭐".repeat(r.rating);

        div.innerHTML = `
            <strong>${r.name}</strong>
            <div class="stars">${stars}</div>
            <p>${r.text}</p>
            ${r.photo ? `<img src="${r.photo}" style="width:100%;border-radius:10px;margin-top:10px;">` : ""}
        `;

        container.appendChild(div);
    });
}

window.onload = mostrarReseñas;
</script>
